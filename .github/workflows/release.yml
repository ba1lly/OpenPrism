name: Publish to PyPI

# Publishes on a version tag (or manual run) via PyPI Trusted Publishing (OIDC) —
# no API token stored anywhere. Requires a one-time PyPI setup: add a trusted
# publisher for project "openprism" pointing at this repo + workflow + the "pypi"
# environment (https://docs.pypi.org/trusted-publishers/).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for trusted publishing
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
